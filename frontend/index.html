<!DOCTYPE html>
<html>
<head>
  <title>URL Shortener Pro</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body class="bg-gray-100 font-sans">

<div class="max-w-3xl mx-auto p-6">

  <h1 class="text-3xl font-bold mb-6 text-center"> URL Shortener </h1>

  <div class="bg-white p-4 rounded shadow mb-6">
    <h2 class="font-bold mb-2">Shorten URL</h2>

    <input id="url" class="border p-2 w-full mb-2" placeholder="https://example.com" />
    <input id="days" class="border p-2 w-full mb-2" placeholder="Expiry days" />

    <button onclick="shorten()" class="bg-blue-500 text-white px-4 py-2 rounded">
      Shorten
    </button>

    <div id="result" class="mt-4"></div>

    <canvas id="qr"></canvas>
  </div>

  <div class="bg-white p-4 rounded shadow">
    <h2 class="font-bold mb-2">Analytics</h2>

    <input id="code" class="border p-2 w-full mb-2" placeholder="short code" />

    <button onclick="getStats()" class="bg-green-500 text-white px-4 py-2 rounded">
      Get Stats
    </button>

    <pre id="stats" class="mt-4 bg-gray-100 p-2"></pre>

    <canvas id="chart" class="mt-4"></canvas>
  </div>

</div>

<script>
const API = "http://localhost:8000";

async function shorten() {
  const url = document.getElementById("url").value;
  const days = parseInt(document.getElementById("days").value || "1");

  const res = await fetch(API + "/shorten", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + localStorage.getItem("token")
    },
    body: JSON.stringify({
      original_url: url,
      expires_days: days
    })
  });

  const data = await res.json();

  const shortUrl = `${API}/${data.short_code}`;

  document.getElementById("result").innerHTML = `
    <div class="mt-2 p-2 bg-gray-100 rounded">
      <p class="font-bold">Short URL:</p>

      <a class="text-blue-600" href="${shortUrl}" target="_blank">
        ${shortUrl}
      </a>

      <button onclick="copyText('${shortUrl}')" class="ml-2 bg-gray-300 px-2 py-1 rounded">
        Copy
      </button>
    </div>
  `;

  QRCode.toCanvas(document.getElementById("qr"), shortUrl);
}

function copyText(text) {
  navigator.clipboard.writeText(text);
  alert("Copied!");
}

async function getStats() {
  const code = document.getElementById("code").value;

  const res = await fetch(API + "/stats/" + code, {
    headers: {
      "Authorization": "Bearer " + localStorage.getItem("token")
    }
  });

  const data = await res.json();

  document.getElementById("stats").innerText =
    JSON.stringify(data, null, 2);

  new Chart(document.getElementById("chart"), {
    type: "bar",
    data: {
      labels: ["Clicks"],
      datasets: [{
        label: "Total Clicks",
        data: [data.click_count],
      }]
    }
  });
}
</script>

</body>
</html>
